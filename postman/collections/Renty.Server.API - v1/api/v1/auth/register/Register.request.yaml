$kind: http-request
url: "{{baseUrl}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "email": "string",
      "password": "string",
      "firstName": "string",
      "lastName": "string",
      "phoneNumber": null
    }
examples: ./.resources/Register.resources/examples
order: 1000
