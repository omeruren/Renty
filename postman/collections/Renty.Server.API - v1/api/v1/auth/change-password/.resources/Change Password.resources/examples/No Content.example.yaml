$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/change-password"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "currentPassword": "string",
        "newPassword": "string"
      }
