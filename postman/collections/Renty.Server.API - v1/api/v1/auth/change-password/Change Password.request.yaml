method: POST
headers:
  Content-Type: application/json
  Accept: application/problem+json
body:
  type: json
  content: |-
    {
      "currentPassword": "string",
      "newPassword": "string"
    }
examples: ./.resources/Change Password.resources/examples
order: 1000
