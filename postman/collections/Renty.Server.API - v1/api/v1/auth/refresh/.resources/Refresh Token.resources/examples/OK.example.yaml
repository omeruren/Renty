$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/refresh"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "refreshToken": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "accessToken": "string",
        "refreshToken": "string",
        "expiresAt": "2019-07-21T22:26:04.552Z"
      }
order: 1000
